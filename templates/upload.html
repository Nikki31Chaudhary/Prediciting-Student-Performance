<!DOCTYPE html>
<html>
<head>

<title>Upload Dataset</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f5f9;
}

.upload-card{
max-width:500px;
margin:auto;
margin-top:120px;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
background:white;
}

</style>

</head>

<body>

<div class="upload-card">

<h4 class="text-center mb-4">Upload Student Dataset</h4>

<form action="/analyze-data" method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Upload CSV File</label>
<input type="file" name="file" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Course</label>
<select class="form-control">
<option>B.Tech CSE</option>
<option>B.Tech Honours</option>
<option>BCA</option>
<option>MCA</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Semester</label>
<select class="form-control">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
</select>
</div>

<button class="btn btn-primary w-100">Analyze Dataset</button>
<div class="alert alert-info mt-3 shadow-sm">

<b>Accepted CSV Format</b>

<pre>
G1,G2,studytime,failures,absences
10,12,2,0,3
5,6,1,1,7
15,14,3,0,1
</pre>

</div>

</form>

</div>

</body>
</html>
