<!DOCTYPE html>
<html>
<head>
    <title>Login | AI Student Risk System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(-45deg,#2563eb,#3b82f6,#1e40af,#1d4ed8);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes gradientBG {
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .login-card {
            width:420px;
            padding:40px;
            border-radius:20px;
            backdrop-filter: blur(18px);
            background: rgba(255,255,255,0.15);
            box-shadow:0 25px 45px rgba(0,0,0,0.25);
            color:white;
        }

        .login-title {
            text-align:center;
            margin-bottom:30px;
            font-weight:600;
            letter-spacing:1px;
        }

        .form-control, .form-select {
            background: rgba(255,255,255,0.2);
            border:none;
            color:white;
            border-radius:12px;
        }

        .form-control::placeholder {
            color:#e5e7eb;
        }

        .form-control:focus, .form-select:focus {
            box-shadow:none;
            background: rgba(255,255,255,0.3);
            color:white;
        }

        .input-group-text {
            background: rgba(255,255,255,0.2);
            border:none;
            color:white;
            border-radius:12px 0 0 12px;
        }

        .btn-primary {
            background:white;
            color:#2563eb;
            border:none;
            border-radius:25px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-primary:hover {
            background:#e0e7ff;
            transform:translateY(-2px);
        }

        .role-select {
            border-radius:12px;
        }

        .small-text {
            text-align:center;
            margin-top:15px;
            font-size:13px;
            color:#e5e7eb;
        }
    </style>
</head>

<body>

<div class="login-card">

    <h4 class="login-title">
        <i class="fa-solid fa-brain"></i> AI Student Risk System
    </h4>

    <form method="POST">

        <!-- Username -->
        <div class="mb-3 input-group">
            <span class="input-group-text">
                <i class="fa-solid fa-user"></i>
            </span>
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <!-- Password -->
        <div class="mb-3 input-group">
            <span class="input-group-text">
                <i class="fa-solid fa-lock"></i>
            </span>
            <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
            <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </span>
        </div>

        <!-- Role -->
        <div class="mb-4">
            <select name="role" class="form-select role-select" required>
                <option value="Admin">Admin</option>
                <option value="Teacher">Teacher</option>
                <option value="Student">Student</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Sign In
        </button>

    </form>

    <div class="small-text">
        Demo Login: admin / 123456
    </div>

</div>

<script>
function togglePassword(){
    let pass = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if(pass.type === "password"){
        pass.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
