<!DOCTYPE html>
<html>
<head>
    <title>Login | AI Student Risk System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#2563eb,#3b82f6);
            font-family: Arial, sans-serif;
        }

        .login-card {
            width:380px;
            padding:30px;
            border-radius:18px;
            background:white;
            box-shadow:0 20px 40px rgba(0,0,0,0.2);
        }

        .login-title {
            text-align:center;
            margin-bottom:25px;
            font-weight:600;
        }

        .btn-primary {
            background:#2563eb;
            border:none;
        }

        .btn-primary:hover {
            background:#1d4ed8;
        }

        .divider {
            text-align:center;
            margin:20px 0;
            color:#6b7280;
        }

        .social-btn {
            border-radius:25px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h4 class="login-title">AI Student Risk System</h4>

    <form method="POST">
        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>

    <div class="divider">OR</div>

    <!-- UI only for now -->
    <button class="btn btn-outline-dark w-100 social-btn mb-2">
        Continue with Google
    </button>

    <button class="btn btn-outline-secondary w-100 social-btn">
        Continue with GitHub
    </button>

    <div class="text-center mt-3">
        <small>Admin login: admin / 123456</small>
    </div>
</div>

</body>
</html>
