<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg,#0f2027,#203a43,#2c5364); height:100vh; display:flex; justify-content:center; align-items:center;">

<div class="card p-4" style="width:350px;">
    <h4 class="text-center mb-3">AI Student Dashboard Login</h4>
    <form method="POST">
        <input class="form-control mb-3" name="username" placeholder="Username" required>
        <input type="password" class="form-control mb-3" name="password" placeholder="Password" required>
        <button class="btn btn-dark w-100">Login</button>
    </form>
</div>

</body>
</html>
